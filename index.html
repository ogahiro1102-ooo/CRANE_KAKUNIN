<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>クレーン申請一覧</title>

<style>
body{
  margin:0;
  padding:10px;
  font-family:sans-serif;
  background:#f2f4f7;
}

.container{
  max-width:1400px;
  margin:auto;
  background:#fff;
  border-radius:12px;
  padding:15px;
  box-shadow:0 4px 8px rgba(0,0,0,.08);
}

h2{
  margin:0 0 15px;
}

/* 操作バー */
.controls{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  margin-bottom:12px;
}

.date-area{
  display:flex;
  gap:8px;
  margin-left:20px;
}

button,input{
  font-size:16px;
  padding:10px 14px;
  border-radius:6px;
  border:none;
}

button{
  color:#fff;
  cursor:pointer;
}

.today-btn{
  background:#007bff;
}

.tomorrow-btn{
  background:#ff9800;
}

.search-btn{
  background:#666;
}

button:hover{
  opacity:.85;
}

input[type="date"]{
  border:1px solid #bbb;
}

/* タイトル */
#titleDate{
  font-size:20px;
  font-weight:bold;
  margin:10px 0;
}

/* テーブル */
.table-wrap{
  overflow-x:auto;
}

table{
  width:100%;
  border-collapse:collapse;
  min-width:1000px;
}

th{
  background:#ff8c00;
  color:#fff;
  padding:10px;
}

td{
  border:1px solid #ccc;
  padding:8px;
  text-align:center;
  font-size:14px;
}

tr:nth-child(even){
  background:#fafafa;
}

tr:hover{
  background:#eef6ff;
}

/* メッセージ */
.message{
  text-align:center;
  padding:30px;
  font-size:22px;
  color:#666;
}
</style>
</head>

<body>

<div class="container">

<h2>🏗️ クレーン申請一覧</h2>

<div class="controls">

  <button class="today-btn" onclick="showToday()">今日</button>
  <button class="tomorrow-btn" onclick="showTomorrow()">明日</button>

  <div class="date-area">
    <input type="date" id="dateFilter">
    <button class="search-btn" onclick="filterDate()">日付抽出</button>
  </div>

</div>

<div id="titleDate"></div>

<div class="table-wrap">
<table>
<thead>
<tr>
<th>時間</th>
<th>業者名</th>
<th>船番</th>
<th>ブロック</th>
<th>内容</th>
<th>サイズ</th>
<th>材料</th>
<th>備考</th>
</tr>
</thead>

<tbody id="body"></tbody>
</table>
</div>

<div id="msg"></div>

</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxKrT-riwuRuTyufCCx8SHTDDqBBTkKZIoy3Itho39powoL59WTHMHNRyCEeycl4mY-/exec";

let allData = [];
let loaded = false;

/* データ取得 */
async function load(){
  const res = await fetch(GAS_URL);
  const data = await res.json();
  allData = data.slice(1);
  loaded = true;
}

/* 読込保証 */
async function ensureLoaded(){
  if(!loaded){
    await load();
  }
}

/* 日付整形 */
function normalizeDate(d){
  return d.replaceAll("/","-");
}

function jpDate(d){
  return d.replaceAll("-","/");
}

/* 時間ソート（数値化） */
function sortTime(rows){
  rows.sort((a,b)=>{
    return timeToMin(a[3]) - timeToMin(b[3]);
  });
}

function timeToMin(t){
  const [h,m] = t.split(":").map(Number);
  return h*60 + m;
}

/* 描画 */
function draw(rows,date,label){

  const body = document.getElementById("body");
  const msg = document.getElementById("msg");
  const title = document.getElementById("titleDate");

  title.innerHTML = `${label}（${jpDate(date)}）`;

  if(rows.length === 0){
    body.innerHTML = "";
    msg.innerHTML = `<div class="message">指定日付に申請なし</div>`;
    return;
  }

  msg.innerHTML = "";

  body.innerHTML = rows.map(r=>`
    <tr>
      <td>${r[3]}</td>
      <td>${r[4]}</td>
      <td>${r[5]}</td>
      <td>${r[6]}</td>
      <td>${r[7]}</td>
      <td>${r[8]}</td>
      <td>${r[9]}</td>
      <td>${r[10]}</td>
    </tr>
  `).join("");
}

/* 共通フィルタ */
function filterCore(dateStr,label){

  let rows = allData.filter(r => normalizeDate(r[2]) === dateStr);

  sortTime(rows);

  draw(rows,dateStr,label);
}

/* 今日 */
async function showToday(){

  await ensureLoaded();

  const d = new Date();

  const y = d.getFullYear();
  const m = String(d.getMonth()+1).padStart(2,"0");
  const day = String(d.getDate()).padStart(2,"0");

  filterCore(`${y}-${m}-${day}`,"本日申請一覧");
}

/* 明日 */
async function showTomorrow(){

  await ensureLoaded();

  const t = new Date();
  t.setDate(t.getDate()+1);

  const y = t.getFullYear();
  const m = String(t.getMonth()+1).padStart(2,"0");
  const day = String(t.getDate()).padStart(2,"0");

  filterCore(`${y}-${m}-${day}`,"明日申請一覧");
}

/* 日付指定 */
async function filterDate(){

  await ensureLoaded();

  const d = document.getElementById("dateFilter").value;
  if(!d) return;

  filterCore(d,"指定日付申請一覧");
}

/* 初期表示（時間帯自動） */
async function autoOpen(){

  const h = new Date().getHours();

  if(h < 9){
    await showToday();
  }else{
    await showTomorrow();
  }
}

/* 起動 */
load().then(()=>autoOpen());

</script>

</body>
</html>
